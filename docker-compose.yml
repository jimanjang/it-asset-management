version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chromeos-assets-db
    environment:
      POSTGRES_DB: chromeos_assets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chromeos-assets-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
